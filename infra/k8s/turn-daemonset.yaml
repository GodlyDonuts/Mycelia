apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mycelia-turn-relay
  namespace: mycelia
spec:
  selector:
    matchLabels:
      app: turn-relay
  template:
    metadata:
      labels:
        app: turn-relay
    spec:
      hostNetwork: true
      containers:
        - name: coturn
          image: coturn/coturn:4.6
          ports:
            - containerPort: 3478
              protocol: UDP
            - containerPort: 5349
              protocol: TCP
          env:
            - name: TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: mycelia-turn
                  key: secret
